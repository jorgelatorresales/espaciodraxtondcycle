
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRAXTON × Dcycle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#2947FE;--primaryHover:#1F37CC;--blue80:#EFF6FF;--blue100:#DBEAFE;
  --white:#FFFFFF;--bg:#FAFAFA;--border:#CFD6E1;--textSec:#415162;--text:#252429;
  --warn:#FF7629;--err:#FF2990;--ok:#38CFD9;--indigo:#6366F1;
}
body{background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);min-height:100vh}
.header{background:var(--white);border-bottom:1px solid var(--border);padding:20px 28px 0;position:sticky;top:0;z-index:10}
.header-inner{max-width:960px;margin:0 auto}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.logo-icon{background:var(--primary);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--white);font-weight:900;font-size:15px}
.logo-sub{color:var(--textSec);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px}
.logo-title{color:var(--text);font-size:17px;font-weight:800}
.logo-title span{color:var(--primary)}
.nav{display:flex;gap:0;overflow-x:auto}
.nav button{background:transparent;border:none;border-bottom:2.5px solid transparent;color:var(--textSec);padding:8px 12px;cursor:pointer;font-size:12.5px;font-weight:500;white-space:nowrap;transition:all .15s;font-family:inherit}
.nav button.active{border-bottom-color:var(--primary);color:var(--primary);font-weight:700}
.nav button:hover{color:var(--primary)}
.content{max-width:960px;margin:0 auto;padding:24px 28px 60px}
.badge{padding:2px 10px;border-radius:6px;font-size:11px;font-weight:600;display:inline-block}
.badge-primary{background:var(--primary);color:var(--white)}
.badge-blue{background:var(--blue100);color:var(--primary)}
.badge-yellow{background:#FEF3C7;color:#92400E}
.badge-green{background:#D1FAE5;color:#065F46}
.card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:20px 24px;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:28px}
.stat{background:var(--white);border-radius:10px;padding:16px 18px;border:1px solid var(--border);text-align:center}
.stat-val{color:var(--primary);font-size:28px;font-weight:800;line-height:1.1}
.stat-name{color:var(--text);font-size:13px;font-weight:600;margin-top:4px}
.stat-sub{color:var(--textSec);font-size:11px;margin-top:2px}
.hero-gradient{background:linear-gradient(135deg,var(--primary),var(--indigo));border-radius:14px;padding:28px;color:var(--white);margin-bottom:20px}
.hero-gradient h3{font-size:18px;font-weight:700;margin-bottom:12px}
.hero-gradient p{font-size:14px;line-height:1.7;margin-bottom:14px;opacity:.95}
.hero-gradient p:last-child{margin-bottom:0}
.blue-box{background:var(--blue80);border-radius:12px;padding:22px 24px;border:1px solid var(--blue100);margin-bottom:20px}
.blue-box h3{color:var(--primary);font-size:16px;font-weight:700;margin-bottom:14px}
.check-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px}
.check-item{display:flex;gap:8px;align-items:flex-start}
.check-item .ck{color:var(--primary);font-size:14px;margin-top:2px;flex-shrink:0}
.check-item span:last-child{color:var(--text);font-size:13.5px;line-height:1.55}
h2.section{font-size:24px;font-weight:800;color:var(--text);margin:0 0 6px}
.section-sub{color:var(--textSec);font-size:14px;margin:0 0 20px}
.diff-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:20px}
.diff-card{border-top:3px solid var(--primary)}
.diff-card .icon{font-size:22px;margin-bottom:6px}
.diff-card .title{font-weight:700;font-size:14px;color:var(--text);margin-bottom:4px}
.diff-card .desc{color:var(--textSec);font-size:13px;line-height:1.6}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.compare-title{font-weight:700;font-size:13px;margin-bottom:6px}
.compare-item{display:flex;gap:5px;margin-bottom:3px;font-size:12.5px}
.dept-card{border-left-width:3px;border-left-style:solid}
.dept-card .dept-name{font-weight:700;font-size:15px;color:var(--text);margin-bottom:8px}
.dept-item{display:flex;gap:6px;align-items:flex-start;margin-bottom:4px}
.dept-item .dot{font-size:8px;margin-top:6px;flex-shrink:0}
.dept-item span:last-child{color:var(--text);font-size:13px;line-height:1.55}
.scope-card .scope-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.scope-card .scope-title{color:var(--text);font-weight:700;font-size:16px}
.scope-card .scope-desc{color:var(--textSec);font-size:13.5px;line-height:1.6;margin-bottom:10px}
.scope-card .scope-item{display:flex;gap:6px;align-items:flex-start;margin-bottom:3px}
.scope-card .scope-item .dot{color:var(--primary);font-size:8px;margin-top:6px}
.scope-card .scope-item span:last-child{color:var(--text);font-size:13px;line-height:1.5}
.phase-btns{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:8px;margin-bottom:20px}
.phase-btn{border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;background:var(--white);border:1.5px solid var(--border);color:var(--text)}
.phase-btn .ph-title{font-weight:700;font-size:13px}
.phase-btn .ph-weeks{font-size:12px;opacity:.8}
.roadmap-table{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden}
.roadmap-header{padding:16px 22px;border-bottom:1px solid var(--border);background:var(--blue80)}
.roadmap-header .rh-title{font-weight:700;font-size:17px;color:var(--text)}
.roadmap-header .rh-weeks{color:var(--textSec);font-size:13px;margin-left:10px}
.roadmap-step{padding:14px 22px;border-bottom:1px solid var(--border)}
.roadmap-step:last-child{border-bottom:none}
.rs-top{display:flex;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:4px}
.rs-week{font-weight:700;font-size:13px}
.rs-who{color:var(--textSec);font-size:11px;background:var(--bg);padding:2px 8px;border-radius:4px}
.rs-action{color:var(--text);font-size:14px;line-height:1.55;margin-bottom:4px}
.rs-out{display:flex;gap:5px;align-items:center}
.rs-out .arrow{color:var(--primary);font-size:11px}
.rs-out .out-text{color:var(--primary);font-size:12px;font-weight:600}
.data-table{background:var(--white);border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.dt-header{display:grid;grid-template-columns:2.5fr 75px 1.5fr;padding:8px 14px;background:var(--bg);border-bottom:1px solid var(--border)}
.dt-header span{color:var(--textSec);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.dt-row{display:grid;grid-template-columns:2.5fr 75px 1.5fr;padding:9px 14px;border-bottom:1px solid var(--border);align-items:center}
.dt-row:last-child{border-bottom:none}
.dt-row .dato{color:var(--text);font-size:13px}
.dt-row .fuente{color:var(--textSec);font-size:12px}
.prio{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600}
.prio .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.role-card{background:var(--white);border-radius:10px;border:1px solid var(--border);border-left-width:3px;border-left-style:solid;padding:16px 20px;margin-bottom:10px}
.role-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.role-name{color:var(--text);font-weight:700;font-size:15px}
.role-person{font-size:13px;font-weight:600}
.role-desc{color:var(--textSec);font-size:13px;line-height:1.55}
.role-section{color:var(--primary);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:0 0 10px}
.ref-card .ref-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.ref-card .ref-name{font-weight:800;font-size:17px;color:var(--text)}
.ref-card .ref-desc{color:var(--textSec);font-size:13.5px;line-height:1.6;margin-bottom:12px}
.ref-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px}
.ref-item{display:flex;gap:5px;font-size:12.5px;color:var(--text)}
.ref-item .ck{flex-shrink:0}
.val-box{background:var(--blue80);border-radius:12px;padding:20px 22px;border:1px solid var(--blue100);margin-top:8px}
.val-box h3{color:var(--primary);font-size:15px;font-weight:700;margin-bottom:12px}
.val-item{display:flex;gap:6px;align-items:flex-start;margin-bottom:4px}
.val-item .dot{color:var(--primary);font-size:8px;margin-top:6px;flex-shrink:0}
.val-item span:last-child{color:var(--text);font-size:13px;line-height:1.55}

/* Business Case */
.bc-hero{background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:14px;padding:28px;color:#fff;margin-bottom:20px}
.bc-hero h3{font-size:20px;font-weight:800;margin-bottom:8px}
.bc-hero p{font-size:14px;line-height:1.7;opacity:.85;margin-bottom:0}
.bc-numbers{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.bc-num{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:18px 20px;text-align:center;position:relative;overflow:hidden}
.bc-num::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary)}
.bc-num.warn::before{background:var(--warn)}
.bc-num.ok::before{background:var(--ok)}
.bc-num.indigo::before{background:var(--indigo)}
.bc-num.err::before{background:var(--err)}
.bc-val{font-size:30px;font-weight:900;color:var(--primary);line-height:1}
.bc-num.warn .bc-val{color:var(--warn)}
.bc-num.ok .bc-val{color:var(--ok)}
.bc-num.indigo .bc-val{color:var(--indigo)}
.bc-num.err .bc-val{color:var(--err)}
.bc-label{font-size:12px;font-weight:600;color:var(--text);margin-top:5px}
.bc-sub{font-size:11px;color:var(--textSec);margin-top:2px;line-height:1.4}
.bc-row{background:var(--white);border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.bc-row-header{padding:12px 18px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.bc-row-header span{font-weight:700;font-size:14px;color:var(--text)}
.bc-row-body{padding:14px 18px}
.bc-row-body p{color:var(--textSec);font-size:13.5px;line-height:1.65}
.bc-row-body strong{color:var(--text)}
.bc-disclaimer{font-size:11px;color:var(--textSec);font-style:italic;margin-top:12px;text-align:center}

/* Stakeholders */
.sh-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.sh-tab{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--textSec);transition:all .15s}
.sh-tab.active{color:var(--white);border-color:transparent}
.sh-panel{display:none}
.sh-panel.active{display:block}
.sh-header{border-radius:12px;padding:22px 24px;margin-bottom:16px;color:var(--white)}
.sh-header h3{font-size:19px;font-weight:800;margin-bottom:4px}
.sh-header p{font-size:13.5px;opacity:.9;line-height:1.5}
.sh-wins{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin-bottom:16px}
.sh-win{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:14px 16px}
.sh-win .win-icon{font-size:18px;margin-bottom:6px}
.sh-win .win-title{font-weight:700;font-size:13px;color:var(--text);margin-bottom:4px}
.sh-win .win-desc{color:var(--textSec);font-size:12.5px;line-height:1.55}
.sh-quote{border-left:3px solid;padding:12px 18px;border-radius:0 8px 8px 0;margin-bottom:16px;background:var(--blue80)}
.sh-quote p{font-style:italic;color:var(--text);font-size:14px;line-height:1.65}
.sh-quote .who{font-size:12px;color:var(--textSec);margin-top:6px;font-style:normal;font-weight:600}

/* CTA */
.cta-block{background:linear-gradient(135deg,var(--primary),var(--indigo));border-radius:14px;padding:32px;text-align:center;margin-bottom:20px;color:var(--white)}
.cta-block h3{font-size:22px;font-weight:800;margin-bottom:8px}
.cta-block p{font-size:14px;opacity:.9;margin-bottom:24px;max-width:520px;margin-left:auto;margin-right:auto;line-height:1.65}
.cta-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-white{background:var(--white);color:var(--primary);border:none;padding:12px 22px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-white:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.btn-outline{background:transparent;color:var(--white);border:1.5px solid rgba(255,255,255,.5);padding:12px 22px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-outline:hover{background:rgba(255,255,255,.1)}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:20px}
.contact-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:20px 22px;border-left-width:3px;border-left-style:solid}
.contact-card .cc-name{font-weight:800;font-size:15px;color:var(--text);margin-bottom:2px}
.contact-card .cc-role{font-size:12px;color:var(--textSec);margin-bottom:10px;font-weight:500}
.contact-card .cc-line{display:flex;gap:6px;align-items:center;font-size:13px;color:var(--text);margin-bottom:4px}
.contact-card .cc-line a{color:var(--primary);text-decoration:none;font-weight:500}
.contact-card .cc-line a:hover{text-decoration:underline}
.next-steps{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.ns-header{padding:16px 22px;background:var(--blue80);border-bottom:1px solid var(--border)}
.ns-header span{font-weight:700;font-size:16px;color:var(--text)}
.ns-step{display:flex;gap:14px;padding:14px 22px;border-bottom:1px solid var(--border);align-items:flex-start}
.ns-step:last-child{border-bottom:none}
.ns-num{background:var(--primary);color:var(--white);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
.ns-body .ns-title{font-weight:700;font-size:14px;color:var(--text);margin-bottom:2px}
.ns-body .ns-desc{font-size:13px;color:var(--textSec);line-height:1.5}
.ns-body .ns-date{font-size:11px;color:var(--primary);font-weight:600;margin-top:3px}

@media(max-width:600px){
  .compare-grid{grid-template-columns:1fr}
  .header{padding:16px 16px 0}
  .content{padding:16px 16px 40px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo-row">
      <div class="logo-icon">d</div>
      <div>
        <div class="logo-sub">Espacio de proyecto</div>
        <div class="logo-title">DRAXTON <span>×</span> Dcycle</div>
      </div>
    </div>
    <div class="nav" id="nav"></div>
  </div>
</div>
<div class="content" id="content"></div>

<script>
const navItems=[
  {id:"inicio",l:"Inicio"},{id:"businessCase",l:"Business Case"},
  {id:"porqueDcycle",l:"Por qué Dcycle"},{id:"stakeholders",l:"Para tu equipo"},
  {id:"alcance",l:"Alcance"},{id:"roadmap",l:"Roadmap"},{id:"datos",l:"Datos"},
  {id:"equipo",l:"Equipo"},{id:"referencia",l:"Referencia"},{id:"cta",l:"Siguiente paso"}
];
let current="inicio", ph=0, sh=0;
const C={primary:"#2947FE",indigo:"#6366F1",warn:"#FF7629",err:"#FF2990",ok:"#38CFD9",border:"#CFD6E1",textSec:"#415162",text:"#252429"};
function prioColor(l){return l==="Crítica"?C.err:l==="Alta"?C.warn:l==="Media"?C.primary:C.ok}
function renderNav(){
  document.getElementById("nav").innerHTML=navItems.map(n=>`<button class="${current===n.id?"active":""}" onclick="go('${n.id}')">${n.l}</button>`).join("");
}
function go(id){current=id;ph=0;renderNav();renderContent();window.scrollTo(0,0)}
function renderContent(){
  const el=document.getElementById("content");
  const fns={inicio,businessCase,porqueDcycle,stakeholders,alcance,roadmap,datos,equipo,referencia,cta};
  el.innerHTML=fns[current]();
}

function inicio(){return `
<div style="text-align:center;padding:20px 0 10px"><span class="badge badge-primary">Propuesta personalizada</span></div>
<h2 style="font-size:30px;font-weight:800;color:var(--text);margin:12px 0 6px;text-align:center;line-height:1.2">DRAXTON <span style="color:var(--primary)">Mobility Inspired</span></h2>
<p style="color:var(--textSec);font-size:15px;line-height:1.65;text-align:center;max-width:640px;margin:0 auto 28px">Una plataforma. Todos vuestros datos ESG. 13 plantas, 6 países, cero excels dispersos. Control total desde el dato hasta el informe, sin depender de consultoras externas para saber dónde está cada cosa.</p>
<div class="stat-grid">
  ${[["~4.000","Empleados"],["13","Plantas","en 6 países"],["3","Alcances","Scope 1, 2 y 3"],["14","Semanas","puesta en marcha"],["1","Plataforma","para todo"]].map(s=>`<div class="stat"><div class="stat-val">${s[0]}</div><div class="stat-name">${s[1]}</div>${s[2]?`<div class="stat-sub">${s[2]}</div>`:""}</div>`).join("")}
</div>
<div class="hero-gradient">
  <h3>El problema que tenéis hoy</h3>
  <p>Excels diferentes por planta. Facturas en varios idiomas. Datos sociales recopilados a mano negocio a negocio. Una dependencia histórica de Global Factor como memoria del proceso — hasta el punto de que Raúl, que lleva poco tiempo, tiene que preguntarle a la consultora dónde están las cosas.</p>
  <p>El equipo central (3 personas) dedica más tiempo a perseguir datos que a analizarlos. Necesitáis control continuo de indicadores durante el año, no solo el <em>photo finish</em> de final de año. Y calidad y fiabilidad del dato, sin error humano.</p>
</div>
<div class="blue-box">
  <h3>Lo que vais a conseguir con Dcycle</h3>
  <div class="check-grid">
    ${["Un único sitio con todos los datos ESG de las 13 plantas, trazados y listos para auditar","Huella de carbono completa (Scope 1, 2 y 3) con foco en materiales comprados — el 70-80% de vuestro Scope 3","EINF bajo GRI generado desde los mismos datos que la huella — sin duplicar trabajo","Dashboards multisitio para comparar rendimiento entre instalaciones y tomar decisiones con datos reales","Métricas clave de CDP y EcoVadis alimentadas desde la misma base — sin formularios paralelos","Control mensual de indicadores, no solo el cierre de año"].map(t=>`<div class="check-item"><span class="ck">✓</span><span>${t}</span></div>`).join("")}
  </div>
</div>
<div class="card">
  <h3 style="color:var(--text);font-size:15px;font-weight:700;margin-bottom:10px">Inicio previsto</h3>
  <p style="color:var(--textSec);font-size:14px;line-height:1.6"><strong style="color:var(--primary)">Septiembre 2026.</strong> Aprovecháis la vuelta de verano para arrancar y llegar a finales de año con la huella hecha y el EINF a punto. El proceso interno de compras, homologación, legal y dirección se cierra antes del verano.</p>
</div>
<div style="text-align:center;padding:8px 0 4px">
  <button onclick="go('businessCase')" style="background:var(--primary);color:white;border:none;padding:13px 28px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-right:8px">Ver Business Case →</button>
  <button onclick="go('cta')" style="background:transparent;color:var(--primary);border:1.5px solid var(--primary);padding:12px 22px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer">Contactar al equipo</button>
</div>`}

function businessCase(){return `
<h2 class="section">Business Case</h2>
<p class="section-sub">¿Qué vale en euros y horas el problema que tenéis ahora? ¿Qué vale resolverlo?</p>

<div class="bc-hero">
  <h3>El coste real de la situación actual</h3>
  <p>Tres personas dedicando semanas al año a perseguir datos entre plantas, consolidar excels en varios idiomas y depender de una consultora para saber dónde está cada cosa. Eso tiene un coste. Aquí está estimado.</p>
</div>

<div class="bc-numbers">
  <div class="bc-num">
    <div class="bc-val">~480h</div>
    <div class="bc-label">Horas/año en recopilación manual</div>
    <div class="bc-sub">3 personas × ~160h en el ciclo de reporting</div>
  </div>
  <div class="bc-num warn">
    <div class="bc-val">~40%</div>
    <div class="bc-label">Tiempo dedicado a perseguir datos</div>
    <div class="bc-sub">vs. analizarlos o tomar decisiones</div>
  </div>
  <div class="bc-num indigo">
    <div class="bc-val">13×</div>
    <div class="bc-label">Fuentes de datos distintas</div>
